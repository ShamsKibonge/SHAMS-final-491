<svg width="200" height="200" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Radial Gradient for the Sun Core -->
    <radialGradient id="sunGradient" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" style="stop-color:#FFD700; stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF8C00; stop-opacity:1" />
    </radialGradient>
    
    <!-- Outer Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Glowing Sun Core (The SHAMS) -->
  <circle cx="50" cy="50" r="22" fill="url(#sunGradient)" filter="url(#glow)" />
  
  <!-- Geometric Rays (Data Beams / Scanning) -->
  <g stroke="#FFD700" stroke-width="2.5" stroke-linecap="round">
    <line x1="50" y1="18" x2="50" y2="8" /> <!-- North -->
    <line x1="50" y1="82" x2="50" y2="92" /> <!-- South -->
    <line x1="82" y1="50" x2="92" y2="50" /> <!-- East -->
    <line x1="18" y1="50" x2="8" y2="50" /> <!-- West -->
    
    <!-- Intermediate Rays (Hunting / Scanning Beams) -->
    <line x1="72" y1="28" x2="80" y2="20" stroke-opacity="0.8" />
    <line x1="28" y1="72" x2="20" y2="80" stroke-opacity="0.8" />
    <line x1="72" y1="72" x2="80" y2="80" stroke-opacity="0.8" />
    <line x1="28" y1="28" x2="20" y2="20" stroke-opacity="0.8" />
  </g>

  <!-- Inner Cyber Lens / Crosshair (Hunting / SOC) -->
  <circle cx="50" cy="50" r="14" stroke="#00E5FF" stroke-width="1" stroke-dasharray="2 1" stroke-opacity="0.6" />
  <line x1="50" y1="42" x2="50" y2="58" stroke="#00E5FF" stroke-width="0.8" />
  <line x1="42" y1="50" x2="58" y2="50" stroke="#00E5FF" stroke-width="0.8" />
  
  <!-- Subtle Outer Ring (The Horizon) -->
  <circle cx="50" cy="50" r="45" stroke="#FFD700" stroke-width="0.5" stroke-opacity="0.2" />

  <!-- Logo Text (Stronger typography placement) -->
  <text x="50" y="115" font-family="Arial, sans-serif" font-size="14" font-weight="900" text-anchor="middle" fill="#FFD700" style="letter-spacing: 2px;">SHAMS</text>
</svg>
